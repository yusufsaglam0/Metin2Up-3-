# Nginx config for Metin2 Sefiri
# Path: /etc/nginx/sites-available/metin2sefiri.conf
# Symlink: ln -s /etc/nginx/sites-available/metin2sefiri.conf /etc/nginx/sites-enabled/
# Test: sudo nginx -t   Reload: sudo systemctl reload nginx

# ====== Rate limit zone (place this OUTSIDE server block, in /etc/nginx/nginx.conf http {} or here) ======
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=2r/s;

# ====== HTTP -> HTTPS redirect ======
server {
    listen 80;
    listen [::]:80;
    server_name metin2sefiri.com www.metin2sefiri.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ====== Main HTTPS server ======
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name metin2sefiri.com www.metin2sefiri.com;

    # ===== SSL (Let's Encrypt) =====
    ssl_certificate     /etc/letsencrypt/live/metin2sefiri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metin2sefiri.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ===== Security headers =====
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===== Logs =====
    access_log /var/log/nginx/metin2sefiri.access.log;
    error_log  /var/log/nginx/metin2sefiri.error.log;

    # ===== Body size & timeouts =====
    client_max_body_size 5m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 15s;

    # ===== Gzip =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # ===== Frontend (React build) =====
    root /var/www/metin2sefiri/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|jpg|jpeg|png|gif|webp|ico|map)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ===== API proxy (Auth - stricter rate limit) =====
    location /api/auth/ {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ===== API proxy (general) =====
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Block dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
